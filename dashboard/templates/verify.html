<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אימות — {{ system_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { background: #1a2e1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-card { background: #fff; border-radius: 12px; padding: 40px 36px; width: 100%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .login-logo { text-align: center; margin-bottom: 28px; }
        .login-logo h1 { color: #2d6a2d; font-size: 1.6rem; margin: 0 0 4px; }
        .login-logo .phone-display { font-size: 1.1rem; color: #333; font-weight: 600; direction: ltr; }
        .login-logo p { color: #666; font-size: 0.88rem; margin: 6px 0 0; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.9rem; color: #333; margin-bottom: 6px; font-weight: 600; }
        .otp-input { width: 100%; box-sizing: border-box; padding: 14px; border: 1.5px solid #ccc; border-radius: 7px; font-size: 1.8rem; letter-spacing: 12px; text-align: center; direction: ltr; }
        .otp-input:focus { outline: none; border-color: #2d6a2d; }
        .btn-login { width: 100%; padding: 12px; background: #2d6a2d; color: #fff; border: none; border-radius: 7px; font-size: 1rem; font-weight: 700; cursor: pointer; }
        .btn-login:hover { background: #245524; }
        .btn-back { width: 100%; padding: 10px; background: transparent; color: #666; border: 1.5px solid #ccc; border-radius: 7px; font-size: 0.9rem; cursor: pointer; margin-top: 10px; }
        .btn-back:hover { border-color: #999; color: #333; }
        .flash-error { background: #fde8e8; color: #c0392b; border-radius: 7px; padding: 10px 14px; margin-bottom: 16px; font-size: 0.9rem; }
        .timer { text-align: center; color: #888; font-size: 0.82rem; margin-top: 12px; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">
        <h1>אימות זהות</h1>
        <div class="phone-display">{{ phone }}</div>
        <p>הזן את הקוד שנשלח אליך בוואטסאפ</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
        <div class="flash-error">{{ msg }}</div>
        {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('verify') }}">
        <div class="form-group">
            <label>קוד אימות</label>
            <input type="text" name="code" class="otp-input" maxlength="6" inputmode="numeric"
                   pattern="[0-9]{6}" placeholder="______" autocomplete="one-time-code" required autofocus>
        </div>
        <button type="submit" class="btn-login">כניסה</button>
    </form>
    <form method="GET" action="{{ url_for('login') }}">
        <button type="submit" class="btn-back">← שנה מספר טלפון</button>
    </form>
    <p class="timer">הקוד תקף ל-5 דקות</p>
</div>
</body>
</html>
