<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כניסה — {{ system_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { background: linear-gradient(135deg,#0a2318,#1a4030); display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
        .login-card { background:#fff; border-radius:14px; padding:40px 36px; width:100%; max-width:380px; box-shadow:0 12px 40px rgba(0,0,0,0.35); }
        .login-logo { text-align:center; margin-bottom:28px; }
        .login-logo h1 { color:#00796b; font-size:1.5rem; margin:0 0 4px; }
        .login-logo p { color:#666; font-size:0.88rem; margin:0; }
        .login-tabs { display:flex; border-bottom:2px solid #e0e0e0; margin-bottom:22px; }
        .login-tab { flex:1; padding:9px; text-align:center; font-size:0.9rem; cursor:pointer; color:#888; border-bottom:3px solid transparent; margin-bottom:-2px; transition:all .2s; }
        .login-tab.active { color:#00796b; border-bottom-color:#00796b; font-weight:700; }
        .tab-panel { display:none; }
        .tab-panel.active { display:block; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:0.88rem; color:#444; margin-bottom:5px; font-weight:600; }
        .form-group input { width:100%; box-sizing:border-box; padding:11px 14px; border:1.5px solid #ddd; border-radius:8px; font-size:1rem; direction:ltr; text-align:left; transition:border-color .2s; }
        .form-group input:focus { outline:none; border-color:#00796b; }
        .btn-login { width:100%; padding:12px; background:#00796b; color:#fff; border:none; border-radius:8px; font-size:1rem; font-weight:700; cursor:pointer; transition:background .2s; }
        .btn-login:hover { background:#004d40; }
        .flash-msg { border-radius:8px; padding:10px 14px; margin-bottom:16px; font-size:0.9rem; }
        .flash-error { background:#fde8e8; color:#c0392b; }
        .flash-success { background:#e8f5e9; color:#2e7d32; }
        .note { text-align:center; color:#888; font-size:0.82rem; margin-top:12px; }
        .divider { text-align:center; color:#bbb; font-size:0.8rem; margin:6px 0 12px; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">
        <h1>🌿 {{ system_title }}</h1>
        <p>{{ company_name }}</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
        <div class="flash-msg flash-{{ cat }}">{{ msg }}</div>
        {% endfor %}
    {% endwith %}

    <div class="login-tabs">
        <div class="login-tab active" onclick="switchTab('password')">🔑 סיסמה</div>
        <div class="login-tab" onclick="switchTab('otp')">📱 קוד WhatsApp</div>
    </div>

    <!-- Password login -->
    <div class="tab-panel active" id="tab-password">
        <form method="POST" action="{{ url_for('login') }}">
            <input type="hidden" name="method" value="password">
            <div class="form-group">
                <label>מספר טלפון</label>
                <input type="tel" name="phone" placeholder="05XXXXXXXX" autocomplete="tel" required autofocus>
            </div>
            <div class="form-group">
                <label>סיסמה</label>
                <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login">כניסה</button>
        </form>
    </div>

    <!-- OTP login -->
    <div class="tab-panel" id="tab-otp">
        <form method="POST" action="{{ url_for('login') }}">
            <input type="hidden" name="method" value="otp">
            <div class="form-group">
                <label>מספר טלפון</label>
                <input type="tel" name="phone" placeholder="05XXXXXXXX" autocomplete="tel" required>
            </div>
            <button type="submit" class="btn-login">שלח קוד אימות</button>
        </form>
        <p class="note">📱 קוד אימות יישלח בוואטסאפ</p>
    </div>
</div>

<script>
function switchTab(tab) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    event.target.classList.add('active');
}
// Show OTP tab if redirected with ?method=otp
if (location.search.includes('method=otp')) switchTab('otp');
</script>
</body>
</html>
